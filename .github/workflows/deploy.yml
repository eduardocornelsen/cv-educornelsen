name: Build and Deploy to Cloud Run

# Trigger is set to manual (workflow_dispatch) so this template repo
# does not auto-run without the required GitHub Secrets configured.
#
# Once you have completed the GCP setup in the README (Steps 8–9),
# change the trigger to auto-deploy on push:
#
#   on:
#     push:
#       branches:
#         - main
#
on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1          # Change to your GCP region if different
  SERVICE_NAME: my-portfolio   # Change to your desired Cloud Run service name
  REPOSITORY: portfolio-repo   # Must match the Artifact Registry repo you created

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build \
            --build-arg VITE_GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --build-arg VITE_APP_URL="https://eduardocornelsen.com" \
            -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
